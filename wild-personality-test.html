<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>野性人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a0a14;color:#e8e8f4;min-height:100vh}

.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(167,94,234,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(55,66,250,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(46,213,115,.05) 0%, transparent 50%)}

.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:36px 16px 72px}

.welcome{text-align:center;padding:40px 12px 28px}
.logo{font-size:72px;display:block}
h1{font-size:36px;font-weight:900;margin-top:14px;
  background:linear-gradient(135deg,#ff4757,#a55eea,#3742fa,#2ed573);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px}
.sub{font-size:14px;color:#8888aa;margin-top:8px}
.zacat{font-size:18px;margin-top:10px;opacity:.7;display:inline-block;animation:floatZ 3s ease-in-out infinite}
@keyframes floatZ{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.desc-box{background:#12122e;border:1px solid rgba(255,255,255,.06);border-radius:18px;
  padding:22px;margin-top:24px;font-size:14px;line-height:1.9;color:#8888aa}
.desc-box strong{color:#e8e8f4}

.btn-start{display:inline-block;margin-top:32px;padding:18px 48px;font-size:20px;font-weight:700;
  color:#fff;background:linear-gradient(135deg,#ff4757,#a55eea);border:none;border-radius:30px;
  cursor:pointer;transition:.3s;letter-spacing:2px}
.btn-start:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(168,85,247,.4)}

/* Question Screen */
.q-wrap{display:none;text-align:center}
.q-num{display:inline-block;background:rgba(168,85,247,.15);color:#a55eea;
  padding:4px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:20px}
.q-text{font-size:22px;font-weight:700;line-height:1.5;margin-bottom:28px;padding:0 8px}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{background:#12122e;border:1px solid rgba(255,255,255,.06);border-radius:16px;
  padding:18px 20px;text-align:left;cursor:pointer;transition:.25s;display:block;text-decoration:none;color:inherit}
.opt:hover{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3);transform:translateX(6px)}
.opt-i{font-size:28px;margin-right:12px;vertical-align:middle}
.opt-t{font-size:16px;font-weight:600;vertical-align:middle}
.opt-d{font-size:12px;color:#8888aa;margin-top:6px;line-height:1.5}

/* Result Screen */
.res-wrap{display:none;text-align:center}
.res-card{background:#12122e;border:1px solid rgba(255,255,255,.06);border-radius:24px;
  padding:40px 28px;margin-top:20px}
.res-icon{font-size:80px;display:block;margin-bottom:12px}
.res-type{font-size:42px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,#ffa502,#ff4757);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.res-name{font-size:18px;color:#8888aa;margin-bottom:24px}
.res-desc{font-size:14px;line-height:2;text-align:left;color:#ccc}
.res-bar-wrap{margin-top:28px;text-align:left}
.res-bar-item{margin-bottom:16px}
.res-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.res-bar-track{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:5px;transition:width .8s ease}
.bar-p{background:linear-gradient(90deg,#ff4757,#ff6b81)}
.bar-i{background:linear-gradient(90deg,#a55eea,#d68aff)}
.bar-b{background:linear-gradient(90deg,#3742fa,#5a6bff)}
.bar-d{background:linear-gradient(90deg,#2ed573,#7bed9f)}

.btn-restart{display:inline-block;margin-top:32px;padding:14px 36px;font-size:16px;font-weight:600;
  color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;
  cursor:pointer;transition:.3s;text-decoration:none}
.btn-restart:hover{background:rgba(255,255,255,.15)}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease both}
</style>
</head>

var curQ = 0;
var scores = {P:0, I:0, B:0, D:0};

window.go = function() {
  console.log('go() called!');
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('qwrap').style.display = 'block';
  document.getElementById('qwrap').className = 'q-wrap fade-in';
  showQ();
};

function showQ() {
  if (curQ >= QS.length) {
    showResult();
    return;
  }
  var q = QS[curQ];
  document.getElementById('qnum').innerHTML = 'Q ' + (curQ + 1) + ' / ' + QS.length;
  document.getElementById('qtext').innerHTML = q.q;

  var html = '';
  var opts = [
    {key:'a', data:q.a},
    {key:'m', data:q.m},
    {key:'b', data:q.b}
  ];
  for (var i = 0; i < opts.length; i++) {
    var o = opts[i];
    var cls = o.key === 'a' ? 'bar-p' : o.key === 'm' ? 'bar-i' : 'bar-b';
    html += '<div class="opt fade-in" onclick="pick(\'' + o.key + '\')">';
    html += '<span class="opt-i">' + o.data.i + '</span>';
    html += '<span class="opt-t">' + o.data.t + '</span>';
    html += '<div class="opt-d">' + o.data.d + '</div>';
    html += '</div>';
  }
  document.getElementById('qopts').innerHTML = html;
}

window.pick = function(key) {
  var q = QS[curQ];
  var pts = key === 'a' ? 2 : key === 'm' ? 1 : 0;
  scores[q.dim] += pts;

  // 对立维度加分
  var opp = {P:0, I:0.5, B:0.5, D:0}; // 反向递减
  if (key === 'b') {
    scores[q.dim] += 0; // 已经最低
  }

  curQ++;
  showQ();
};

function showResult() {
  document.getElementById('qwrap').style.display = 'none';
  document.getElementById('res').style.display = 'block';
  document.getElementById('res').className = 'res-wrap fade-in';

  // 归一化分数
  var totalP = 0, totalI = 0, totalB = 0, totalD = 0;
  for (var j = 0; j < QS.length; j++) {
    if (QS[j].dim === 'P') totalP += 2;
    if (QS[j].dim === 'I') totalI += 2;
    if (QS[j].dim === 'B') totalB += 2;
    if (QS[j].dim === 'D') totalD += 2;
  }

  var pct = {
    P: Math.round(scores.P / totalP * 100),
    I: Math.round(scores.I / totalI * 100),
    B: Math.round(scores.B / totalB * 100),
    D: Math.round(scores.D / totalD * 100)
  };

  // 选择结果
  var maxDim = 'P', maxVal = -1;
  var dims = ['P','I','B','D'];
  for (var k = 0; k < dims.length; k++) {
    if (pct[dims[k]] > maxVal) {
      maxVal = pct[dims[k]];
      maxDim = dims[k];
    }
  }

  // 根据最大维度 + 其他维度组合选结果
  var idx = (pct.P > 50 ? 1 : 0) + (pct.I > 50 ? 2 : 0) + (pct.B > 50 ? 4 : 0) + (pct.D > 50 ? 8 : 0);
  idx = idx % RESULTS.length;

  var r = RESULTS[idx];
  document.getElementById('ricon').innerHTML = r.icon;
  document.getElementById('rtype').innerHTML = r.type;
  document.getElementById('rname').innerHTML = r.name;
  document.getElementById('rdesc').innerHTML = r.desc;

  // 显示维度条
  var barHtml = '';
  var barDims = [['P','群居/独行','bar-p'],['I','直觉/嗅觉','bar-i'],['B','硬核/温柔','bar-b'],['D','宅家/漂泊','bar-d']];
  for (var b = 0; b < barDims.length; b++) {
    var bd = barDims[b];
    var val = r.bars[bd[0]] !== undefined ? r.bars[bd[0]] : pct[bd[0]];
    barHtml += '<div class="res-bar-item">';
    barHtml += '<div class="res-bar-label"><span>' + DIMS[bd[0]].name + ' ' + DIMS[bd[0]].ln + '/' + DIMS[bd[0]].rn + '</span><span>' + val + '%</span></div>';
    barHtml += '<div class="res-bar-track"><div class="res-bar-fill ' + bd[2] + '" style="width:' + val + '%"></div></div>';
    barHtml += '</div>';
  }
  document.getElementById('rbars').innerHTML = barHtml;
}

console.log('WPT loaded! go() function is:', typeof window.go);

})();
</script>
</body>
</html>
